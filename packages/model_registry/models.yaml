# Model registry - single source of model truth (design doc §13).
# Drives: UI dropdown, backend validation, warnings, run metadata, generated scripts.
# NOTE: revisions marked "PIN_ME" must be resolved to a commit hash before Phase 1 exit
# (huggingface_hub: model_info(id).sha) - parity tests depend on pinned revisions.

models:
  - id: all-minilm-l6-v2
    provider_model_id: sentence-transformers/all-MiniLM-L6-v2
    display_name: "MiniLM L6 v2 (default - CCR reference model)"
    revision: 1110a243fdf4706b3f48f1d95db1a4f5529b4d41
    default: true
    supported_languages: ["en"]
    embedding_dimension: 384
    max_seq_length: 256
    quality_tier: fast
    speed_tier: fast
    usage_config:
      requires_prefix: false
      symmetric_similarity_prefix: null
      pooling: sentence_transformers_default   # descriptive only - never reimplement
      normalize_embeddings: true
    operational_config:
      expected_time_per_1k_texts_cpu: benchmark_required
      worker_ram_min_gb: 2
      lazy_load: false
    warnings: []

  - id: e5-large-v2
    provider_model_id: intfloat/e5-large-v2
    display_name: "E5 Large v2 (strong English - slower)"
    revision: f169b11e22de13617baa190a028a32f3493550b6
    default: false
    supported_languages: ["en"]
    embedding_dimension: 1024
    max_seq_length: 512
    quality_tier: strong
    speed_tier: slow
    usage_config:
      requires_prefix: true
      symmetric_similarity_prefix: "query: "
      construct_prefix: "query: "
      text_prefix: "query: "
      pooling: average_pool                    # descriptive only - never reimplement
      normalize_embeddings: true
    operational_config:
      expected_time_per_1k_texts_cpu: benchmark_required
      worker_ram_min_gb: 4
      worker_ram_recommended_gb: 8
      lazy_load: true
      max_resident_models: 1
    warnings:
      - "Substantially slower and heavier than MiniLM."
      - "Scores are not comparable across model families."

  - id: multilingual-e5-base
    provider_model_id: intfloat/multilingual-e5-base
    display_name: "Multilingual E5 Base (50+ languages)"
    revision: d128750597153bb5987e10b1c3493a34e5a4502a
    default: false
    supported_language_set: xlm_roberta_100    # resolved in language_sets.py
    embedding_dimension: 768
    max_seq_length: 512
    quality_tier: balanced
    speed_tier: medium
    usage_config:
      requires_prefix: true
      symmetric_similarity_prefix: "query: "
      construct_prefix: "query: "
      text_prefix: "query: "
      pooling: average_pool                    # descriptive only - never reimplement
      normalize_embeddings: true
    operational_config:
      expected_time_per_1k_texts_cpu: benchmark_required
      worker_ram_min_gb: 4
      lazy_load: true
      max_resident_models: 1
    warnings:
      - "Quality varies by language, especially lower-resource languages."
      - "Scores are not comparable across model families."

  # PsyEmbedding family (Culture & Morality Lab): sentence-transformers models
  # fine-tuned for psychological text analysis on sentence-similarity pairs.
  # Added on PI request 2026-07-18. All four: mean pooling, no prefix, English,
  # 1024-dim, 512-token window, ~1.3 GB download on first use (lazy).

  - id: psyembedding-bert-large
    provider_model_id: Culture-and-Morality-Lab/psyembedding-bert-large-uncased
    display_name: "PsyEmbedding BERT Large (psychology fine-tune)"
    revision: c5bd80df046c9fe92838b808f14bee34c8a329ae
    default: false
    supported_languages: ["en"]
    embedding_dimension: 1024
    max_seq_length: 512
    quality_tier: specialized
    speed_tier: slow
    usage_config:
      requires_prefix: false
      symmetric_similarity_prefix: null
      pooling: mean                            # per model card; see pooling_fallback
      # The published repos' modules.json references a 1_Pooling config the
      # repos do not contain, so SentenceTransformer(id) cannot auto-load
      # them; the backend builds Transformer+mean-Pooling explicitly.
      pooling_fallback: mean
      normalize_embeddings: true
    operational_config:
      expected_time_per_1k_texts_cpu: benchmark_required
      worker_ram_min_gb: 4
      lazy_load: true
      max_resident_models: 1
    warnings:
      - "Fine-tuned for psychological text; general-domain performance untested."
      - "Substantially slower and heavier than MiniLM."
      - "Scores are not comparable across model families."

