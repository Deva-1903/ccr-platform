- item_id: mfq_2_equality_2
  text: The world would be a better place if everyone made the same amount of money.
  reverse_scored: false
- item_id: mfq_2_equality_8
  text: Our society would have fewer problems if people had the same income.
  reverse_scored: false
- item_id: mfq_2_equality_14
  text: I believe that everyone should be given the same quantity of resources in life.
  reverse_scored: false
- item_id: mfq_2_equality_20
  text: I believe it would be ideal if everyone in society wound up with roughly the same amount of money.
  reverse_scored: false
- item_id: mfq_2_equality_26
  text: When people work together toward a common goal, they should share the rewards equally, even if
    some worked harder on it.
  reverse_scored: false
- item_id: mfq_2_equality_32
  text: I get upset when some people have a lot more money than others in my country.
  reverse_scored: false
