items:
- item_id: sdo7_anti_egalitarianism_9
  text: We should not push for group equality.
  reverse_scored: false
- item_id: sdo7_anti_egalitarianism_10
  text: We shouldn’t try to guarantee that every group has the same quality of life.
  reverse_scored: false
- item_id: sdo7_anti_egalitarianism_11
  text: It is unjust to try to make groups equal.
  reverse_scored: false
- item_id: sdo7_anti_egalitarianism_12
  text: Group equality should not be our primary goal.
  reverse_scored: false
- item_id: sdo7_anti_egalitarianism_13
  text: We should work to give all groups an equal chance to succeed.
  reverse_scored: true
- item_id: sdo7_anti_egalitarianism_14
  text: We should do what we can to equalize conditions for different groups.
  reverse_scored: true
- item_id: sdo7_anti_egalitarianism_15
  text: No matter how much effort it takes, we ought to strive to ensure that all groups have the same
    chance in life.
  reverse_scored: true
- item_id: sdo7_anti_egalitarianism_16
  text: Group equality should be our ideal.
  reverse_scored: true
