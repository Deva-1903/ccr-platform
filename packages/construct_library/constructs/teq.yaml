- item_id: teq_1
  text: When someone else is feeling excited, I tend to get excited too
  reverse_scored: false
- item_id: teq_2
  text: Other people's misfortunes do not disturb me a great deal
  reverse_scored: false
- item_id: teq_3
  text: It upsets me to see someone being treated disrespectfully
  reverse_scored: false
- item_id: teq_4
  text: I remain unaffected when someone close to me is happy
  reverse_scored: false
- item_id: teq_5
  text: I enjoy making other people feel better
  reverse_scored: false
- item_id: teq_6
  text: I have tender, concerned feelings for people less fortunate than me
  reverse_scored: false
- item_id: teq_7
  text: When a friend starts to talk about his/her problems, I try to steer the conversation towards something
    else
  reverse_scored: false
